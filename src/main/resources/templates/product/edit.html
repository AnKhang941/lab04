<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">
<head>
    <title>Edit Product</title>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            border-radius: 12px 12px 0 0 !important;
        }
        .btn-primary {
            min-width: 120px;
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container body-content">

    <div class="row justify-content-center mt-4">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Edit Product</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/products/save}" th:object="${product}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Enter product name" />
                        </div>

                        <div class="mb-3">
                            <label for="image" class="form-label fw-semibold">Image URL</label>
                            <input type="text" th:field="*{image}" id="image" class="form-control" placeholder="http://image.jpg" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Price</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" th:field="*{price}" class="form-control" placeholder="0.00" />
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Category</label>
                            <select th:field="*{category.id}" class="form-select">
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                Update Product
                            </button>
                            <a th:href="@{/products}" class="btn btn-secondary px-4">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
