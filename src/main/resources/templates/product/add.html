<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            border-radius: 12px 12px 0 0 !important;
        }
        .btn-primary {
            min-width: 120px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card">
                <div class="card-header py-3">
                    <h4 class="mb-0">Add Product</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/products/save}"
                          th:object="${product}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Enter product name" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Image URL</label>
                            <input type="text" th:field="*{image}" class="form-control" placeholder="Enter image URL" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Price</label>
                            <div class="input-group">
                                <span class="input-group-text">₫</span>
                                <input type="number" th:field="*{price}" class="form-control" placeholder="Enter price" />
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Category</label>
                            <select th:field="*{category.id}" class="form-select">
                                <option value="">-- Select category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
